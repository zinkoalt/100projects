<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Formatter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="input-container">
            <h2>Type In Your Words</h2>
            <input type="text" id="input-field" placeholder="type your text here...">
        </div>

        <div class="btns-container">
            <button class="btn uppercase">Uppercase</button>
            <button class="btn lowercase">Lowercase</button>
            <button class="btn capitalize">Capitalize</button>
            <button class="btn bold">Bold</button>
            <button class="btn italic">Italic</button> 
            <button class="btn underline">Underline</button>     
        </div>
        <p id="output-field">Output</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
