<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Popup</title>
    <link rel="stylesheet" href="style.css">
   
</head>
<body>
    <header>
        <div class="content-container">
            <h1>Welcome TO The Real World</h1>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Saepe quia officia quis, vero, culpa unde sequi sed praesentium optio magnam soluta necessitatibus non aperiam quas ad corporis dolores eveniet sit.</p>
            <button class="cta-btn" id="open">Sign Up</button>
        </div>
    </header>
    <section class="modal-container" id="modal">
        <section class="modal">
            <button class="close-btn" id="close">x</button>
         <div class="modal-content">
                <h1>Sign Up</h1>
                <form class="modal-form">
                    <div>
                        <label for="name">Name</label>
                        <input type="text" id="name" placeholder="Enter your name" class="form-input">
                    </div>
                     <div>
                        <label for="email">Email</label>
                        <input type="text" id="email" placeholder="Enter your Email" class="form-input">
                    </div>
                     <div>
                        <label for="password">Password</label>
                        <input type="text" id="password" placeholder="Enter your Password" class="form-input">
                    </div>
                                        <div>
                        <label for="password1">Confirm Password</label>
                        <input type="text" id="password1" placeholder="Confirm your Password" class="form-input">
                    </div>
                    <input type="submit" value="submit" class="submit-btn">
                </form>
            </div>

        </section>
        
    </section>
    <script src="script.js"></script>
</body> 
</html>
